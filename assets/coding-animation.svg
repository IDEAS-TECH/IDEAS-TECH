<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" width="100%" height="100%">
  <defs>
    <style>
      /* ── Background ── */
      @keyframes bgPulse {
        0%, 100% { opacity: 0.4; }
        50% { opacity: 0.7; }
      }
      @keyframes gridMove {
        0% { transform: translate(0, 0); }
        100% { transform: translate(40px, 40px); }
      }
      /* ── Typing Arms ── */
      @keyframes typeLeft {
        0%, 100% { transform: rotate(-18deg); }
        50% { transform: rotate(-5deg); }
      }
      @keyframes typeRight {
        0%, 100% { transform: rotate(18deg); }
        50% { transform: rotate(5deg); }
      }
      @keyframes keyGlow {
        0%, 100% { opacity: 0.3; }
        50% { opacity: 0.8; }
      }
      /* ── Body Bounce ── */
      @keyframes bodyBounce {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-2px); }
      }
      /* ── Head Bob ── */
      @keyframes headBob {
        0%, 100% { transform: rotate(0deg); }
        25% { transform: rotate(-2deg); }
        75% { transform: rotate(2deg); }
      }
      /* ── Blink ── */
      @keyframes blink {
        0%, 95%, 100% { transform: scaleY(1); }
        97% { transform: scaleY(0.1); }
      }
      /* ── Stars Orbit ── */
      @keyframes orbit1 { 100% { transform: rotate(360deg); } }
      @keyframes orbit2 { 100% { transform: rotate(-360deg); } }
      @keyframes orbit3 { 100% { transform: rotate(360deg); } }
      @keyframes orbit4 { 100% { transform: rotate(-360deg); } }
      @keyframes orbit5 { 100% { transform: rotate(360deg); } }
      @keyframes orbit6 { 100% { transform: rotate(-360deg); } }
      @keyframes orbit7 { 100% { transform: rotate(360deg); } }
      @keyframes orbit8 { 100% { transform: rotate(-360deg); } }
      /* ── Star Twinkle ── */
      @keyframes twinkle1 {
        0%, 100% { opacity: 0.3; transform: scale(0.6); }
        50% { opacity: 1; transform: scale(1.2); }
      }
      @keyframes twinkle2 {
        0%, 100% { opacity: 0.6; transform: scale(0.8); }
        33% { opacity: 1; transform: scale(1.3); }
        66% { opacity: 0.4; transform: scale(0.5); }
      }
      /* ── Code Scroll ── */
      @keyframes scrollCode {
        0% { transform: translateY(0); }
        100% { transform: translateY(-240px); }
      }
      @keyframes cursorBlink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }
      /* ── Particles ── */
      @keyframes float1 {
        0%, 100% { transform: translate(0, 0); opacity: 0; }
        10% { opacity: 0.6; }
        90% { opacity: 0.6; }
        50% { transform: translate(-30px, -40px); }
      }
      @keyframes float2 {
        0%, 100% { transform: translate(0, 0); opacity: 0; }
        10% { opacity: 0.4; }
        90% { opacity: 0.4; }
        50% { transform: translate(20px, -30px); }
      }
      /* ── Screen Glow ── */
      @keyframes screenGlow {
        0%, 100% { opacity: 0.5; }
        50% { opacity: 0.8; }
      }
      /* ── Classes ── */
      .bg-pulse { animation: bgPulse 4s ease-in-out infinite; }
      .type-l { transform-origin: 225px 260px; animation: typeLeft 0.25s ease-in-out infinite; }
      .type-r { transform-origin: 375px 260px; animation: typeRight 0.25s ease-in-out infinite 0.12s; }
      .body-bounce { animation: bodyBounce 0.5s ease-in-out infinite; }
      .head-bob { animation: headBob 0.8s ease-in-out infinite; }
      .eye-blink { animation: blink 4s ease-in-out infinite; }
      .orbit-1 { transform-origin: 300px 155px; animation: orbit1 6s linear infinite; }
      .orbit-2 { transform-origin: 300px 155px; animation: orbit2 8s linear infinite; }
      .orbit-3 { transform-origin: 300px 155px; animation: orbit3 7s linear infinite; }
      .orbit-4 { transform-origin: 300px 155px; animation: orbit4 9s linear infinite; }
      .orbit-5 { transform-origin: 300px 155px; animation: orbit5 5s linear infinite; }
      .orbit-6 { transform-origin: 300px 155px; animation: orbit6 10s linear infinite; }
      .orbit-7 { transform-origin: 300px 155px; animation: orbit7 6.5s linear infinite; }
      .orbit-8 { transform-origin: 300px 155px; animation: orbit8 7.5s linear infinite; }
      .star-1 { animation: twinkle1 1.5s ease-in-out infinite; }
      .star-2 { animation: twinkle2 2s ease-in-out infinite 0.3s; }
      .star-3 { animation: twinkle1 1.8s ease-in-out infinite 0.6s; }
      .star-4 { animation: twinkle2 2.2s ease-in-out infinite 0.9s; }
      .star-5 { animation: twinkle1 1.3s ease-in-out infinite 0.2s; }
      .star-6 { animation: twinkle2 1.7s ease-in-out infinite 0.5s; }
      .star-7 { animation: twinkle1 2.1s ease-in-out infinite 0.8s; }
      .star-8 { animation: twinkle2 1.9s ease-in-out infinite 0.1s; }
      .code-scroll { animation: scrollCode 8s linear infinite; }
      .cursor { animation: cursorBlink 0.6s step-end infinite; }
      .float-a { animation: float1 6s ease-in-out infinite; }
      .float-b { animation: float2 5s ease-in-out infinite 1s; }
      .float-c { animation: float1 7s ease-in-out infinite 2s; }
      .float-d { animation: float2 4.5s ease-in-out infinite 0.5s; }
      .screen-glow { animation: screenGlow 3s ease-in-out infinite; }
    </style>
    <!-- Gradients -->
    <radialGradient id="bgGlow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#1a1a4e"/>
      <stop offset="60%" stop-color="#0e0e24"/>
      <stop offset="100%" stop-color="#060612"/>
    </radialGradient>
    <linearGradient id="deskGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a1f14"/>
      <stop offset="100%" stop-color="#1a120a"/>
    </linearGradient>
    <linearGradient id="monitorFrame" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a2a3a"/>
      <stop offset="100%" stop-color="#1a1a28"/>
    </linearGradient>
    <linearGradient id="screenGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0f1a"/>
      <stop offset="100%" stop-color="#0d1424"/>
    </linearGradient>
    <linearGradient id="hoodieGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2d1b69"/>
      <stop offset="100%" stop-color="#1a0f3a"/>
    </linearGradient>
    <linearGradient id="hairGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#0d0d0d"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="starGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- ─── Background ─── -->
  <rect width="1000" height="600" fill="url(#bgGlow)"/>
  <rect width="1000" height="600" fill="url(#grid)"/>
  
  <!-- Ambient glow behind character -->
  <circle cx="300" cy="220" r="200" fill="#4a2aff" opacity="0.06" filter="url(#softGlow)" class="bg-pulse"/>
  <ellipse cx="700" cy="250" rx="180" ry="140" fill="#00d4ff" opacity="0.05" filter="url(#softGlow)" class="screen-glow"/>

  <!-- ─── Desk ─── -->
  <rect x="0" y="410" width="1000" height="190" fill="url(#deskGrad)"/>
  <rect x="0" y="410" width="1000" height="4" fill="#3d2a1a" opacity="0.6"/>
  <rect x="0" y="414" width="1000" height="1" fill="#4a3520" opacity="0.3"/>

  <!-- ─── Monitor ─── -->
  <!-- Stand base -->
  <rect x="670" y="395" width="60" height="15" rx="3" fill="#1a1a28"/>
  <!-- Stand neck -->
  <rect x="695" y="360" width="10" height="40" fill="#222233"/>
  <!-- Monitor body -->
  <rect x="560" y="140" width="280" height="230" rx="12" fill="url(#monitorFrame)" stroke="#3a3a4a" stroke-width="2"/>
  <!-- Screen -->
  <rect x="575" y="155" width="250" height="200" rx="4" fill="url(#screenGrad)" stroke="#1a1a2a" stroke-width="1"/>
  <!-- Screen inner glow -->
  <rect x="575" y="155" width="250" height="200" rx="4" fill="none" stroke="#00d4ff" opacity="0.1" class="screen-glow" stroke-width="1"/>
  
  <!-- ─── Code Lines (Monitor) ─── -->
  <g class="code-scroll">
    <rect x="590" y="180" width="80" height="6" rx="3" fill="#ff6b6b" opacity="0.8"/>
    <rect x="590" y="195" width="40" height="6" rx="3" fill="#ffd93d" opacity="0.8"/>
    <rect x="635" y="195" width="60" height="6" rx="3" fill="#6bcb77" opacity="0.7"/>
    <rect x="590" y="210" width="100" height="6" rx="3" fill="#6bcb77" opacity="0.8"/>
    <rect x="590" y="225" width="160" height="6" rx="3" fill="#4d96ff" opacity="0.7"/>
    <rect x="590" y="240" width="55" height="6" rx="3" fill="#ff6b6b" opacity="0.8"/>
    <rect x="650" y="240" width="70" height="6" rx="3" fill="#ffd93d" opacity="0.6"/>
    <rect x="590" y="255" width="130" height="6" rx="3" fill="#6bcb77" opacity="0.9"/>
    <rect x="590" y="270" width="90" height="6" rx="3" fill="#4d96ff" opacity="0.7"/>
    <rect x="590" y="285" width="180" height="6" rx="3" fill="#c084fc" opacity="0.6"/>
    <rect x="590" y="300" width="45" height="6" rx="3" fill="#ff6b6b" opacity="0.8"/>
    <rect x="640" y="300" width="100" height="6" rx="3" fill="#6bcb77" opacity="0.7"/>
    <rect x="590" y="315" width="140" height="6" rx="3" fill="#ffd93d" opacity="0.8"/>
    <rect x="590" y="330" width="70" height="6" rx="3" fill="#4d96ff" opacity="0.9"/>
    <rect x="590" y="345" width="200" height="6" rx="3" fill="#c084fc" opacity="0.7"/>
    <rect x="590" y="360" width="110" height="6" rx="3" fill="#6bcb77" opacity="0.8"/>
    <rect x="590" y="375" width="60" height="6" rx="3" fill="#ff6b6b" opacity="0.7"/>
    <rect x="655" y="375" width="90" height="6" rx="3" fill="#4d96ff" opacity="0.8"/>
    <rect x="590" y="390" width="150" height="6" rx="3" fill="#ffd93d" opacity="0.6"/>
    <!-- More code lines for scrolling -->
    <rect x="590" y="410" width="85" height="6" rx="3" fill="#6bcb77" opacity="0.8"/>
    <rect x="590" y="425" width="120" height="6" rx="3" fill="#c084fc" opacity="0.7"/>
    <rect x="590" y="440" width="50" height="6" rx="3" fill="#4d96ff" opacity="0.9"/>
    <rect x="645" y="440" width="80" height="6" rx="3" fill="#ff6b6b" opacity="0.6"/>
    <rect x="590" y="455" width="170" height="6" rx="3" fill="#ffd93d" opacity="0.8"/>
    <rect x="590" y="470" width="95" height="6" rx="3" fill="#6bcb77" opacity="0.7"/>
  </g>
  <!-- Cursor -->
  <rect x="795" y="345" width="3" height="16" rx="1" fill="#ffffff" class="cursor"/>

  <!-- ─── Keyboard ─── -->
  <rect x="200" y="388" width="200" height="22" rx="4" fill="#1a1a2a" stroke="#2a2a3a" stroke-width="1"/>
  <!-- Keys row 1 -->
  <rect x="206" y="391" width="14" height="7" rx="1.5" fill="#222233"/>
  <rect x="224" y="391" width="14" height="7" rx="1.5" fill="#222233"/>
  <rect x="242" y="391" width="14" height="7" rx="1.5" fill="#222233"/>
  <rect x="260" y="391" width="14" height="7" rx="1.5" fill="#222233"/>
  <rect x="278" y="391" width="14" height="7" rx="1.5" fill="#222233"/>
  <rect x="296" y="391" width="14" height="7" rx="1.5" fill="#222233"/>
  <rect x="314" y="391" width="14" height="7" rx="1.5" fill="#222233"/>
  <rect x="332" y="391" width="14" height="7" rx="1.5" fill="#222233"/>
  <rect x="350" y="391" width="14" height="7" rx="1.5" fill="#222233"/>
  <rect x="368" y="391" width="14" height="7" rx="1.5" fill="#222233"/>
  <!-- Keys row 2 -->
  <rect x="210" y="400" width="14" height="7" rx="1.5" fill="#222233"/>
  <rect x="228" y="400" width="14" height="7" rx="1.5" fill="#222233"/>
  <rect x="246" y="400" width="14" height="7" rx="1.5" fill="#222233"/>
  <rect x="264" y="400" width="14" height="7" rx="1.5" fill="#222233"/>
  <rect x="282" y="400" width="14" height="7" rx="1.5" fill="#222233"/>
  <rect x="300" y="400" width="14" height="7" rx="1.5" fill="#222233"/>
  <rect x="318" y="400" width="14" height="7" rx="1.5" fill="#222233"/>
  <rect x="336" y="400" width="14" height="7" rx="1.5" fill="#222233"/>
  <rect x="354" y="400" width="14" height="7" rx="1.5" fill="#222233"/>
  <!-- Spacebar -->
  <rect x="230" y="408" width="140" height="4" rx="2" fill="#222233"/>
  
  <!-- Key press glow effect handled by animate elements below -->

  <!-- ─── Character (Boy) ─── -->
  <g class="body-bounce">
    <!-- Body / Hoodie -->
    <path d="M 228 255 L 372 255 Q 380 255 380 265 L 380 370 Q 380 385 365 385 L 235 385 Q 220 385 220 370 L 220 265 Q 220 255 228 255 Z" fill="url(#hoodieGrad)"/>
    <!-- Hoodie zipper line -->
    <line x1="300" y1="260" x2="300" y2="385" stroke="#3a2a7a" stroke-width="1.5" opacity="0.5"/>
    <!-- Hoodie pocket -->
    <path d="M 245 360 Q 300 375 355 360" fill="none" stroke="#3a2a7a" stroke-width="2" opacity="0.4"/>
    <!-- Hoodie collar -->
    <path d="M 260 255 Q 300 240 340 255" fill="none" stroke="#3a2a7a" stroke-width="2"/>

    <!-- Neck -->
    <rect x="285" y="235" width="30" height="25" rx="5" fill="#c48a5c"/>

    <!-- ─── Head ─── -->
    <g class="head-bob">
      <!-- Head base -->
      <circle cx="300" cy="155" r="48" fill="#c48a5c"/>
      <!-- Hair -->
      <path d="M 252 145 Q 252 105 300 100 Q 348 105 348 145 Q 348 135 340 130 Q 330 120 300 118 Q 270 120 260 130 Q 252 135 252 145 Z" fill="url(#hairGrad)"/>
      <!-- Hair side details -->
      <path d="M 252 145 Q 248 155 254 165" fill="none" stroke="#0d0d0d" stroke-width="6" stroke-linecap="round"/>
      <path d="M 348 145 Q 352 155 346 165" fill="none" stroke="#0d0d0d" stroke-width="6" stroke-linecap="round"/>
      <!-- Hair top spikes -->
      <path d="M 280 105 Q 285 90 295 102" fill="#0d0d0d"/>
      <path d="M 300 100 Q 305 85 310 100" fill="#0d0d0d"/>
      <path d="M 315 103 Q 322 88 325 105" fill="#0d0d0d"/>

      <!-- Face - serious expression -->
      <!-- Left eye -->
      <g class="eye-blink">
        <ellipse cx="282" cy="150" rx="9" ry="10" fill="white"/>
        <ellipse cx="284" cy="150" rx="5" ry="6" fill="#1a1a2a"/>
        <circle cx="286" cy="147" r="2.5" fill="white"/>
      </g>
      <!-- Right eye -->
      <g class="eye-blink" style="animation-delay: 0.1s;">
        <ellipse cx="318" cy="150" rx="9" ry="10" fill="white"/>
        <ellipse cx="316" cy="150" rx="5" ry="6" fill="#1a1a2a"/>
        <circle cx="318" cy="147" r="2.5" fill="white"/>
      </g>
      <!-- Eyebrows (focused/serious) -->
      <line x1="270" y1="137" x2="294" y2="135" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>
      <line x1="330" y1="137" x2="306" y2="135" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>
      <!-- Mouth (focused/typing - slight frown of concentration) -->
      <path d="M 290 172 Q 300 168 310 172" fill="none" stroke="#8b5a3c" stroke-width="2" stroke-linecap="round"/>
      
      <!-- Ear left -->
      <ellipse cx="252" cy="155" rx="6" ry="10" fill="#b8784a"/>
      <!-- Ear right -->
      <ellipse cx="348" cy="155" rx="6" ry="10" fill="#b8784a"/>
    </g>

    <!-- ─── Arms (Typing Animation) ─── -->
    <!-- Left Arm -->
    <g class="type-l">
      <!-- Upper arm -->
      <path d="M 235 265 L 185 355" stroke="#2d1b69" stroke-width="22" stroke-linecap="round" fill="none"/>
      <!-- Forearm -->
      <path d="M 185 355 L 170 392" stroke="#2d1b69" stroke-width="18" stroke-linecap="round" fill="none"/>
      <!-- Hand -->
      <circle cx="170" cy="392" r="10" fill="#c48a5c"/>
    </g>

    <!-- Right Arm -->
    <g class="type-r">
      <!-- Upper arm -->
      <path d="M 365 265 L 415 355" stroke="#2d1b69" stroke-width="22" stroke-linecap="round" fill="none"/>
      <!-- Forearm -->
      <path d="M 415 355 L 430 392" stroke="#2d1b69" stroke-width="18" stroke-linecap="round" fill="none"/>
      <!-- Hand -->
      <circle cx="430" cy="392" r="10" fill="#c48a5c"/>
    </g>
  </g>

  <!-- ─── Keyboard Glow on Typing ─── -->
  <rect x="290" y="391" width="20" height="7" rx="1.5" fill="#00d4ff" opacity="0.3">
    <animate attributeName="opacity" values="0.3;0.8;0.3" dur="0.25s" repeatCount="indefinite"/>
  </rect>
  <rect x="310" y="400" width="20" height="7" rx="1.5" fill="#00d4ff" opacity="0.3">
    <animate attributeName="opacity" values="0.3;0.8;0.3" dur="0.25s" repeatCount="indefinite" begin="0.12s"/>
  </rect>

  <!-- ─── Stars Orbiting Head ─── -->
  <g filter="url(#starGlow)">
    <!-- Star 1 -->
    <g class="orbit-1">
      <polygon class="star-1" points="300,75 303,82 310,83 305,88 307,95 300,91 293,95 295,88 290,83 297,82" fill="#FFD700" style="transform: translateX(90px);"/>
    </g>
    <!-- Star 2 -->
    <g class="orbit-2">
      <polygon class="star-2" points="300,75 304,84 313,84 306,90 309,99 300,94 291,99 294,90 287,84 296,84" fill="#FFD700" style="transform: translateX(110px)"/>
    </g>
    <!-- Star 3 -->
    <g class="orbit-3">
      <polygon class="star-3" points="300,75 302,81 308,82 303,86 305,92 300,89 295,92 297,86 292,82 298,81" fill="#FFD700" style="transform: translateX(75px)"/>
    </g>
    <!-- Star 4 -->
    <g class="orbit-4">
      <polygon class="star-4" points="300,75 303,82 310,83 305,88 307,95 300,91 293,95 295,88 290,83 297,82" fill="#FFD700" style="transform: translateX(130px)"/>
    </g>
    <!-- Star 5 -->
    <g class="orbit-5">
      <polygon class="star-5" points="300,75 304,84 313,84 306,90 309,99 300,94 291,99 294,90 287,84 296,84" fill="#FFD700" style="transform: translateX(95px)"/>
    </g>
    <!-- Star 6 -->
    <g class="orbit-6">
      <polygon class="star-6" points="300,75 302,81 308,82 303,86 305,92 300,89 295,92 297,86 292,82 298,81" fill="#FFD700" style="transform: translateX(115px)"/>
    </g>
    <!-- Star 7 -->
    <g class="orbit-7">
      <polygon class="star-7" points="300,75 303,82 310,83 305,88 307,95 300,91 293,95 295,88 290,83 297,82" fill="#FFD700" style="transform: translateX(80px)"/>
    </g>
    <!-- Star 8 -->
    <g class="orbit-8">
      <polygon class="star-8" points="300,75 304,84 313,84 306,90 309,99 300,94 291,99 294,90 287,84 296,84" fill="#FFD700" style="transform: translateX(120px)"/>
    </g>
  </g>

  <!-- Star sparkle trails (smaller dots following orbit) -->
  <g>
    <circle cx="300" cy="155" r="3" fill="#FFD700" opacity="0.6" filter="url(#glow)">
      <animate attributeName="r" values="3;5;3" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- ─── Floating Particles ─── -->
  <circle cx="150" cy="300" r="2" fill="#00d4ff" class="float-a"/>
  <circle cx="180" cy="250" r="1.5" fill="#4a2aff" class="float-b"/>
  <circle cx="120" cy="350" r="1.5" fill="#ff6b6b" class="float-c"/>
  <circle cx="850" cy="280" r="2" fill="#6bcb77" class="float-d"/>
  <circle cx="820" cy="320" r="1.5" fill="#ffd93d" class="float-a" style="animation-delay: 0.7s;"/>
  <circle cx="160" cy="280" r="1" fill="#c084fc" class="float-b" style="animation-delay: 1.5s;"/>

  <!-- ─── Ambient light particles from monitor ─── -->
  <circle cx="700" cy="350" r="1" fill="#00d4ff" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0.1;0.5" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="680" cy="370" r="1.5" fill="#4d96ff" opacity="0.4">
    <animate attributeName="opacity" values="0.4;0.1;0.4" dur="2.5s" repeatCount="indefinite" begin="0.5s"/>
  </circle>
  <circle cx="720" cy="340" r="0.8" fill="#00d4ff" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0.2;0.6" dur="4s" repeatCount="indefinite" begin="1s"/>
  </circle>

  <!-- ─── Bottom gradient fade ─── -->
  <rect x="0" y="520" width="1000" height="80" fill="url(#bgGlow)" opacity="0.8"/>
</svg>
